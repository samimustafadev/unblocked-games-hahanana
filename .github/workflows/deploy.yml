# Simple GitHub Actions workflow to automatically build and deploy the Unblocked Arcade to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Change this to master if your default branch is named master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The directory Vite compiles the built files into
          branch: gh-pages # The target branch to put the static HTML/JS/CSS in
